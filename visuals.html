<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance / Технические работы / Tehniskie darbi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f7;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #000;
        }
        .lang-group {
            margin-bottom: 1.5rem;
        }
        .lang-group:last-child {
            margin-bottom: 0;
        }
        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 0.3rem;
        }
        .message {
            font-weight: 500;
            font-size: 1.2rem;
        }
        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-group">
            <div class="label">English</div>
            <div class="message">Scheduled maintenance in progress. We'll be back soon!</div>
        </div>

        <hr>

        <div class="lang-group">
            <div class="label">Русский</div>
            <div class="message">Ведутся технические работы. Мы скоро вернемся!</div>
        </div>

        <hr>

        <div class="lang-group">
            <div class="label">Latviešu</div>
            <div class="message">Notiek tehniskie darbi. Drīz būsim atpakaļ!</div>
        </div>
    </div>

</body>
</html>
