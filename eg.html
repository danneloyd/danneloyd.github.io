<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - Nighty Gang</title>
    <link rel="icon" type="image/png" href="images/fav.png">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --secondary-bg: rgba(22, 22, 22, 0.7); 
            --card-border: 1px solid rgba(255, 255, 255, 0.1);
            --card-radius: 24px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/background/bc2.png') no-repeat center center fixed;
            background-size: cover;
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
            padding: 40px 0;
        }

        @keyframes logo-glow {
            0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
            50% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); }
            100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
        }

        .game-selection-container {
            background: var(--secondary-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: var(--card-radius);
            border: var(--card-border);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            overflow: hidden; /* Важно для закругления краев медиа-блока */
        }

        /* Стили для имитации "Server Style" */
        .server-preview {
            margin: -50px -50px 30px -50px;
            height: 180px;
            background: #111 url('images/demos/server-photo.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .status-badge-mini {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dot { height: 8px; width: 8px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

        .logo-small {
            width: 80px;
            margin-bottom: 20px;
            animation: logo-glow 4s ease-in-out infinite;
        }

        h1 {
            font-size: 1.4rem; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            font-weight: 300;
            line-height: 1.4;
            margin-top: 0;
            text-transform: uppercase;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-btn {
            padding: 18px 30px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            transition: var(--transition);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .game-btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .back-link {
            margin-top: 25px;
            display: inline-block;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        .icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .server-meta {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-top: -15px;
            margin-bottom: 20px;
        }
    </style>
</head>
