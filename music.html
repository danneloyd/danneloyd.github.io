<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists - Nighty Gang Music</title>
    <link rel="icon" type="image/png" href="images/fav.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: #ffffff; 
            --secondary-bg: rgba(22, 22, 22, 0.7); 
            --sidebar-width: 280px;
            --card-border: 1px solid rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --card-radius: 24px;
        }

        @keyframes card-glow {
            0% { box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 5px rgba(255,255,255,0.02); }
            50% { box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 15px rgba(255,255,255,0.1); }
            100% { box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 5px rgba(255,255,255,0.02); }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/background/bc2.png') no-repeat center center fixed;
            background-size: cover;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- НОВЫЙ HEADER И SIDEBAR ИЗ ABOUT --- */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 15px; 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            height: 60px; 
            box-sizing: border-box; 
        }

        .sidebar { 
            position: fixed; 
            top: 15px; 
            bottom: 15px; 
            left: -320px; 
            width: 280px; 
            background: rgba(15, 15, 15, 0.75); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            z-index: 2100; 
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            padding: 20px 10px; 
            display: flex; 
            flex-direction: column; 
            border-radius: 28px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 25px 0 50px rgba(0,0,0,0.6);
        }

        .sidebar.active { left: 15px; }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 25px 20px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #fff;
        }

        .sidebar-brand img { width: 32px; height: 32px; border-radius: 8px; }

        .close-sidebar-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
            line-height: 1;
        }

        .close-sidebar-btn:hover { opacity: 1; transform: rotate(90deg); }

        .sidebar a { 
            margin: 4px 10px;
            padding: 14px 20px; 
            text-decoration: none; 
            color: rgba(255,255,255,0.6); 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            transition: 0.4s; 
            border-radius: 18px; 
        }

        .sidebar a svg { width: 22px; height: 22px; fill: currentColor; transition: 0.3s; }
        .sidebar a:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateX(8px); }
        .sidebar a.active-link { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .menu-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; padding: 10px; transition: 0.3s; }
        .menu-btn:hover { color: var(--accent-color); }
        
        .brand { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .brand img { width: 30px; height: 30px; border-radius: 5px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2050; transition: 0.3s; }
        .overlay.active { display: block; backdrop-filter: blur(5px); }

        /* --- НОВЫЙ ЯЗЫКОВОЙ ПЕРЕКЛЮЧАТЕЛЬ --- */
        .lang-wrapper { position: relative; z-index: 2001; }
        .lang-current { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer; 
            padding: 6px 15px; 
            background: rgba(255,255,255,0.08); 
            border-radius: 20px; 
            font-size: 13px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .flag-icon { width: 18px; height: 13px; display: block; object-fit: cover; border-radius: 2px; }

        .lang-dropdown { 
            display: none; 
            position: absolute; 
            right: 0; 
            top: 45px; 
            background: #1a1a1a; 
            border-radius: 12px; 
            min-width: 160px; 
            border: 1px solid rgba(255,255,255,0.1); 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lang-dropdown.show { display: block; }
        .lang-dropdown div { 
            padding: 12px 15px; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 14px;
        }
        .lang-dropdown div:hover { background: rgba(255,255,255,0.1); }

        /* --- СТИЛИ КОНТЕНТА (БЕЗ ИЗМЕНЕНИЙ) --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .section-title { 
            text-align: center; margin-bottom: 50px; font-size: 2.5rem; letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .artist-card { 
            background: var(--secondary-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px; 
            border-radius: 24px; 
            border: var(--card-border); 
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
            position: relative;
            animation: card-glow 10s infinite ease-in-out;
        }

        .artist-card:hover { 
            border-color: rgba(255, 255, 255, 0.3); 
            transform: translateY(-5px);
            background: rgba(30, 30, 30, 0.75);
        }
        
        .artist-avatar { 
            width: 170px; height: 170px; border-radius: 20px; 
            object-fit: cover; flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.4s;
        }

        .artist-card:hover .artist-avatar {
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .artist-info { flex: 1; }
        .artist-name { font-size: 2.2rem; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: #fff; }
        .verify-badge { color: #00d4ff; font-size: 1.2rem; filter: drop-shadow(0 0 5px rgba(0,212,255,0.4)); }

        .links-row { display: flex; flex-wrap: wrap; gap: 15px; }
        .link-circle {
            width: 50px; height: 50px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: var(--transition);
            font-size: 22px; color: #fff;
        }
        .link-circle:hover { 
            transform: translateY(-3px) scale(1.1); 
            border-color: #fff; 
            background: rgba(255,255,255,0.15);
        }

        .custom-icon { width: 24px; height: 24px; object-fit: contain; }
        .fa-spotify { color: #1DB954; }
        .fa-soundcloud { color: #ff5500; }
        .fa-youtube { color: #ff0000; }
        .fa-apple { color: #ffffff; }
        .fa-deezer { color: #a238ff; } 
        .fa-amazon { color: #ff9900; }

        @media (max-width: 768px) {
            .sidebar.active { left: 10px; right: 10px; width: auto; }
            .container { padding: 0 20px; }
            .artist-card { 
                flex-direction: column; text-align: center; 
                padding: 30px 20px; border-radius: 0; 
                margin-left: -20px; margin-right: -20px;
                gap: 25px;
            }
            .artist-avatar { width: 140px; height: 140px; }
            .artist-name { justify-content: center; font-size: 1.8rem; }
            .links-row { justify-content: center; }
            .section-title { font-size: 2rem; }
            .brand span { display: none; }
        }
    </style>
</head>

<script>
    const flags = {
        'EN': '<svg class="flag-icon" viewBox="0 0 640 480"><path fill="#012169" d="M0 0h640v480H0z"/><path fill="#FFF" d="m75 0 244 181L562 0h78v62L400 241l240 178v61h-78L320 301 78 480H0v-61l240-178L0 62V0h75z"/><path fill="#C8102E" d="m424 281 216 159v40L369 281h55zM216 199 0 41v40l196 158h20zm351 0L423 281h74l143-105v-40l-73 63zM0 439l196-158h-55L0 398v41z"/><path fill="#FFF" d="M241 0v480h160V0H241z"/><path fill="#FFF" d="M0 160v160h640V160H0z"/><path fill="#C8102E" d="M0 193v95h640v-95H0zM273 0v480h95V0h-95z"/></svg>',
        'RU': '<svg class="flag-icon" viewBox="0 0 640 480"><path fill="#fff" d="M0 0h640v480H0z"/><path fill="#0039a6" d="M0 160h640v320H0z"/><path fill="#d52b1e" d="M0 320h640v160H0z"/></svg>',
        'LV': '<svg class="flag-icon" viewBox="0 0 640 480"><path fill="#9e3039" d="M0 0h640v480H0z"/><path fill="#fff" d="M0 192h640v96H0z"/></svg>'
    };

    const translations = {
        'EN': {
            'nav-home': 'Home', 'nav-musicprod': 'Music Production', 'nav-visuals': 'Visual Production',
            'nav-streaming': 'Streaming Platforms', 'nav-social': 'Social Media',
            'nav-server': 'Minecraft Server', 'nav-minigames': 'Minigames', 'nav-about': 'About', 'page-title': 'Artists & Releases'
        },
        'RU': {
            'nav-home': 'Главная', 'nav-musicprod': 'Музыкальный продакшн', 'nav-visuals': 'Визуальный продакшн',
            'nav-streaming': 'Стриминг', 'nav-social': 'Соц. сети',
            'nav-server': 'Сервер Minecraft', 'nav-minigames': 'Мини-игры', 'nav-about': 'О нас', 'page-title': 'Артисты и Релизы'
        },
        'LV': {
            'nav-home': 'Sākums', 'nav-musicprod': 'Mūzikas producēšana', 'nav-visuals': 'Vizuālā producēšana',
            'nav-streaming': 'Straumēšanas platformas', 'nav-social': 'Sociālie tīkli',
            'nav-server': 'Minecraft serveris', 'nav-minigames': 'Minispēles', 'nav-about': 'Par mums', 'page-title': 'Mākslinieki un relīzes'
        }
    };

    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    function toggleLang() {
        document.getElementById("lang-list").classList.toggle("show");
    }

    function selectLang(code) {
        localStorage.setItem('ng_lang_code', code);
        document.getElementById("current-code").innerText = code;
        document.getElementById("current-flag").innerHTML = flags[code];
        document.getElementById("lang-list").classList.remove("show");

        const langData = translations[code];
        for (let key in langData) {
            let el = document.getElementById(key) || document.getElementById('txt-' + key) || document.getElementById('nav-' + key);
            if (el) el.innerText = langData[key];
        }
    }

    window.onclick = function(event) {
        if (!event.target.closest('.lang-wrapper')) {
            const dropdown = document.getElementById("lang-list");
            if (dropdown?.classList.contains('show')) dropdown.classList.remove('show');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedCode = localStorage.getItem('ng_lang_code') || 'EN';
        selectLang(savedCode);
    });
</script>
</body>
</html>
