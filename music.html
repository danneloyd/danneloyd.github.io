<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists - Nighty Gang</title>
    <link rel="icon" type="image/png" href="images/fav.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: #ffffff; 
            --secondary-bg: #161616;
            --sidebar-width: 280px;
            --card-bg: linear-gradient(145deg, #1e1e1e, #161616);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px); position: sticky; top: 0;
            z-index: 2000; border-bottom: 1px solid #333; height: 60px; box-sizing: border-box;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .menu-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; padding: 10px; transition: 0.3s; }
        .menu-btn:hover { color: var(--accent-color); }
        
        /* --- SIDEBAR --- */
        .sidebar { 
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-width)); 
            width: var(--sidebar-width); height: 100%; background: var(--secondary-bg); 
            z-index: 2100; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding-top: 80px; box-shadow: 10px 0 30px rgba(0,0,0,0.7); 
            display: flex; flex-direction: column; 
        }
        .sidebar.active { left: 0; }
        .close-menu-btn {
            position: absolute; top: 15px; right: 20px;
            background: none; border: none; color: white;
            font-size: 36px; cursor: pointer; transition: 0.3s;
            line-height: 1; padding: 0;
        }
        .close-menu-btn:hover { color: var(--accent-color); transform: scale(1.1); }

        .sidebar a { 
            padding: 15px 25px; text-decoration: none; color: #fff; opacity: 0.8;
            display: flex; align-items: center; gap: 15px; border-left: 4px solid transparent; transition: 0.3s; 
        }
        .sidebar a:hover { 
            background: rgba(255, 255, 255, 0.08); opacity: 1;
            border-left: 4px solid #fff; padding-left: 35px; 
        }
        .sidebar a svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2050; }
        .overlay.active { display: block; }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .brand img { width: 30px; height: 30px; border-radius: 5px; }

        /* --- LANG SELECTOR --- */
        .lang-wrapper { position: relative; z-index: 2001; }
        .lang-current { display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 5px 12px; background: #222; border-radius: 20px; border: 1px solid #444; font-size: 13px; }
        .lang-dropdown { display: none; position: absolute; right: 0; top: 40px; background: #222; border: 1px solid #444; border-radius: 8px; min-width: 120px; overflow: hidden; }
        .lang-dropdown div { padding: 10px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .lang-dropdown div:hover { background: #fff; color: black; }
        .show { display: block; }

        /* --- CONTENT --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .section-title { text-align: center; margin-bottom: 40px; font-size: 2rem; letter-spacing: 1px; }

        /* Artist Card */
        .artist-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .artist-card::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            transform: skewX(-25deg); transition: 0.75s;
        }

        .artist-card:hover { 
            border-color: rgba(255, 255, 255, 0.4); 
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            background: linear-gradient(145deg, #252525, #1e1e1e);
        }
        
        .artist-card:hover::after { left: 150%; }
        
        .artist-avatar { 
            width: 160px; height: 160px; border-radius: 16px; 
            object-fit: cover; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .artist-info { flex: 1; }
        .artist-name { font-size: 2rem; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: #fff; }
        
        .verify-badge { color: #00d4ff; font-size: 1.2rem; }

        .links-row { display: flex; flex-wrap: wrap; gap: 15px; }

        .link-circle {
            width: 50px; height: 50px; background: #1f1f1f;
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: var(--transition);
            font-size: 22px;
        }

        .link-circle:hover { 
            transform: scale(1.15) rotate(5deg); 
            border-color: #fff; 
            background: #2a2a2a;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .custom-icon { width: 24px; height: 24px; object-fit: contain; }

        .fa-spotify { color: #1DB954; }
        .fa-soundcloud { color: #ff5500; }
        .fa-youtube { color: #ff0000; }
        .fa-apple { color: #ffffff; filter: drop-shadow(0 0 2px rgba(255,255,255,0.5)); }
        .fa-deezer { color: #a238ff; } 
        .fa-amazon { color: #ff9900; }

        @media (max-width: 750px) {
            .artist-card { flex-direction: column; text-align: center; padding: 25px; border-radius: 0; margin-left: -20px; margin-right: -20px; }
            .artist-name { justify-content: center; font-size: 1.6rem; }
            .links-row { justify-content: center; }
        }
        @media (max-width: 650px) {
            .brand span { display: none; }
        }
    </style>
</head>

<script>
    const translations = {
        'EN': {
            'nav-home': 'Home', 'nav-musicprod': 'Music Production', 'nav-visuals': 'Visual Production',
            'nav-streaming': 'Streaming Platforms', 'nav-social': 'Social Media',
            'nav-server': 'Minecraft Server', 'nav-about': 'About', 'page-title': 'Artists & Releases'
        },
        'RU': {
            'nav-home': 'Главная', 'nav-musicprod': 'Муз. продакшн', 'nav-visuals': 'Визуальный продакшн',
            'nav-streaming': 'Стриминг', 'nav-social': 'Соц. сети',
            'nav-server': 'Сервер Minecraft', 'nav-about': 'О нас', 'page-title': 'Артисты и Релизы'
        },
        'LV': {
            'nav-home': 'Sākums', 'nav-musicprod': 'Mūzikas producēšana', 'nav-visuals': 'Vizuālā producēšana',
            'nav-streaming': 'Straumēšanas platformas', 'nav-social': 'Sociālie tīkli',
            'nav-server': 'Minecraft serveris', 'nav-about': 'Par mums', 'page-title': 'Mākslinieki un relīzes'
        }
    };

    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    function toggleLang() {
        document.getElementById("lang-list").classList.toggle("show");
    }

    function selectLang(code, flag) {
        localStorage.setItem('ng_lang_code', code);
        localStorage.setItem('ng_lang_flag', flag);

        document.getElementById("current-code").innerText = code;
        document.getElementById("current-flag").innerText = flag;
        document.getElementById("lang-list").classList.remove("show");

        const langData = translations[code];
        for (let key in langData) {
            let el = document.getElementById(key);
            if (!el) el = document.getElementById('txt-' + key);
            if (!el) el = document.getElementById('nav-' + key);
            if (el) el.innerText = langData[key];
        }
    }

    window.onclick = function(event) {
        if (!event.target.closest('.lang-wrapper')) {
            const dropdown = document.getElementById("lang-list");
            if (dropdown?.classList.contains('show')) dropdown.classList.remove('show');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedCode = localStorage.getItem('ng_lang_code');
        const savedFlag = localStorage.getItem('ng_lang_flag');
        if (savedCode && savedFlag) {
            selectLang(savedCode, savedFlag);
        }
    });
</script>
