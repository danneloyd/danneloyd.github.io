<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аленчик: БИТВА ЗА ТРЕЗВОСТЬ</title>
    <style>
        :root { --primary: #8B4513; --neon-blue: #D2691E; --dark-bg: #0a0510; --red: #ff2a2a; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            height: 100%; 
            max-height: 900px; 
            background: var(--dark-bg); 
            overflow: hidden; 
            border: 2px solid #333; 
        }

        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }

        .ui-layer { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px); 
            z-index: 100; 
            text-align: center; 
            padding: 20px; 
            transition: 0.4s;
        }

        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .hud { 
            position: absolute; 
            top: 40px; 
            width: 100%; 
            padding: 0 25px; 
            display: flex; 
            flex-direction: column;
            gap: 15px;
            z-index: 50; 
            pointer-events: none; 
        }

        .stats-top { display: flex; justify-content: space-between; font-weight: 900; font-size: 20px; text-shadow: 2px 2px 0 #000; }

        .hp-container {
            width: 100%;
            height: 16px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #444;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #hp-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #adff2f);
            transition: width 0.3s, background 0.3s;
            box-shadow: 0 0 15px rgba(0,255,0,0.5);
        }

        h1 { color: #f4a460; text-shadow: 0 0 20px #8B4513; font-size: 32px; margin-bottom: 5px; }
        
        .btn { 
            background: linear-gradient(180deg, #8B4513, #5D2E0C); 
            color: white; border: none; padding: 18px 50px; 
            font-size: 22px; font-weight: bold; border-radius: 12px; 
            cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #3E1F08;
            text-decoration: none;
            display: inline-block;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #3E1F08; }

        .btn-secondary {
            background: linear-gradient(180deg, #444, #222);
            box-shadow: 0 6px 0 #111;
            font-size: 18px;
            padding: 12px 40px;
        }
        .btn-secondary:active { box-shadow: 0 2px 0 #111; }

        #flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 90;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="flash"></div>
        <div class="hud">
            <div class="stats-top">
                <div>СЧЕТ: <span id="score-val">0</span></div>
                <div id="best-val">РЕКОРД: 0</div>
            </div>
            <div class="hp-container">
                <div id="hp-bar"></div>
            </div>
        </div>

        <div id="menu" class="ui-layer">
            <h1 id="msg">АЛЕНЧИК: БИТВА ЗА ТРЕЗВОСТЬ</h1>
            <div id="menu-best">Лучший результат: 0</div>
            <button class="btn" id="start-btn">В БОЙ!</button>
            <a href="../games.html" class="btn btn-secondary">НАЗАД</a>
        </div>
        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const vW = 600; const vH = 1000;
    canvas.width = vW; canvas.height = vH;

    const alenchikImg = new Image(); alenchikImg.src = 'images/alenchik.png';
    const girlImg = new Image(); girlImg.src = 'images/pivo.png';
    
    // АУДИО
    const audio = new Audio('music/alenchik.mp3'); audio.loop = true;
    const hitSound = new Audio('fx/gunshot.mp3');
    const damageSound = new Audio('fx/elbow-to-jaw.mp3'); // Звук при получении урона
    const gameOverSound = new Audio('fx/option-1.mp3');    // Звук при проигрыше

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 10 + 5;
            this.speedX = (Math.random() - 0.5) * 15;
            this.speedY = (Math.random() - 0.5) * 15;
            this.life = 1.0;
            this.color = Math.random() > 0.5 ? '#8B4513' : '#D2691E';
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.life -= 0.04;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    const game = {
        active: false, 
        score: 0, 
        hp: 100,
        shake: 0,
        enemies: [], 
        particles: [],
        bestScore: localStorage.getItem('alenchikBest') || 0,

        start() {
            this.active = true; 
            this.score = 0; 
            this.hp = 100;
            this.enemies = [];
            this.particles = [];
            this.updateHPUI();
            document.getElementById('score-val').innerText = "0";
            document.getElementById('menu').classList.add('hidden');
            audio.currentTime = 0;
            audio.play().catch(() => {});
            this.loop();
        },

        updateHPUI() {
            const bar = document.getElementById('hp-bar');
            bar.style.width = this.hp + "%";
            if (this.hp > 50) bar.style.background = "linear-gradient(90deg, #00ff00, #adff2f)";
            else if (this.hp > 25) bar.style.background = "linear-gradient(90deg, #ffca00, #ff8800)";
            else bar.style.background = "linear-gradient(90deg, #ff0000, #8b0000)";
        },

        triggerFlash() {
            const f = document.getElementById('flash');
            f.style.opacity = "0.5";
            setTimeout(() => f.style.opacity = "0", 100);
        },

        gameOver() {
            this.active = false;
            if (this.score > this.bestScore) {
                this.bestScore = this.score;
                localStorage.setItem('alenchikBest', this.bestScore);
            }
            document.getElementById('menu-best').innerText = "Рекорд: " + this.bestScore;
            document.getElementById('msg').innerText = "СБУХАЛСЯ!";
            document.getElementById('menu').classList.remove('hidden');
            
            audio.pause();
            gameOverSound.currentTime = 0;
            gameOverSound.play().catch(() => {}); // Воспроизводим звук проигрыша
        },

        loop() {
            if (!this.active) return;
            ctx.clearRect(0,0,vW,vH);
            
            ctx.save();
            if (this.shake > 0) {
                ctx.translate(Math.random()*this.shake - this.shake/2, Math.random()*this.shake - this.shake/2);
                this.shake *= 0.85;
            }

            ctx.fillStyle = "#0a0510"; ctx.fillRect(0,0,vW,vH);
            
            this.particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.life <= 0) this.particles.splice(i, 1);
            });

            if (alenchikImg.complete && alenchikImg.naturalWidth !== 0) {
                ctx.drawImage(alenchikImg, vW/2-70, vH-200, 140, 180);
            } else {
                ctx.fillStyle = "#D2691E"; ctx.fillRect(vW/2-40, vH-150, 80, 100);
            }

            if (Math.random() < 0.03 + (this.score * 0.0005)) {
                this.enemies.push({ 
                    x: Math.random()*(vW-100)+50, 
                    y: -100, 
                    speed: 4 + Math.random()*3 + (this.score * 0.05) 
                });
            }

            this.enemies.forEach((en, i) => {
                en.y += en.speed;
                if (girlImg.complete && girlImg.naturalWidth !== 0) {
                    ctx.drawImage(girlImg, en.x-45, en.y, 90, 110);
                } else {
                    ctx.fillStyle = "#8B4513"; ctx.fillRect(en.x-35, en.y, 70, 90);
                }

                if (en.y > vH - 220) {
                    this.enemies.splice(i, 1);
                    this.hp -= 20;
                    this.shake = 30;
                    this.triggerFlash();
                    this.updateHPUI();
                    
                    // Проигрываем звук урона
                    damageSound.currentTime = 0;
                    damageSound.play().catch(() => {});
                    
                    if (this.hp <= 0) this.gameOver();
                }
            });

            ctx.restore();
            requestAnimationFrame(() => this.loop());
        },

        shoot(x, y) {
            for (let i = this.enemies.length - 1; i >= 0; i--) {
                let en = this.enemies[i];
                if (Math.abs(en.x - x) < 70 && Math.abs(en.y + 50 - y) < 80) {
                    for(let j=0; j<12; j++) this.particles.push(new Particle(en.x, en.y + 50));
                    
                    this.enemies.splice(i, 1);
                    this.score++;
                    document.getElementById('score-val').innerText = this.score;
                    this.playHitSound();
                    break;
                }
            }
        },

        playHitSound() {
            hitSound.currentTime = 0;
            hitSound.play().catch(() => {});
        }
    };

    document.getElementById('start-btn').onclick = () => game.start();
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        game.shoot((e.clientX - rect.left) * (vW/rect.width), (e.clientY - rect.top) * (vH/rect.height));
    });
    canvas.addEventListener('touchstart', (e) => {
        if(game.active) e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        game.shoot((e.touches[0].clientX - rect.left) * (vW/rect.width), (e.touches[0].clientY - rect.top) * (vH/rect.height));
    }, { passive: false });

    document.getElementById('best-val').innerText = "РЕКОРД: " + game.bestScore;
    document.getElementById('menu-best').innerText = "Лучший результат: " + game.bestScore;
</script>
</body>
</html>
