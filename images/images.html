<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const menu = document.getElementById('menu');
    const bestValHud = document.getElementById('best-val');
    const menuBest = document.getElementById('menu-best');
    const gameOverMsg = document.getElementById('game-over-msg');
    const volumeSlider = document.getElementById('volume-slider');

    // Настройка размеров с учетом мобильных экранов
    const vW = 600;
    const vH = 1000;
    canvas.width = vW;
    canvas.height = vH;

    const demonImg = new Image();
    demonImg.src = 'demonkid.jpg';

    const audioManager = {
        bgMusic: new Audio('images.mp3'),
        isInitialized: false,
        
        init() {
            if (this.isInitialized) return;
            this.bgMusic.loop = true;
            this.bgMusic.volume = volumeSlider.value;
            this.isInitialized = true;
        },

        playMusic() {
            this.init();
            this.bgMusic.currentTime = 0;
            // Важно для мобилок: запуск внутри жеста
            const promise = this.bgMusic.play();
            if (promise !== undefined) {
                promise.catch(e => console.log("Audio play blocked"));
            }
        },

        stopMusic() {
            this.bgMusic.pause();
        },

        setVolume(val) {
            this.bgMusic.volume = val;
        },

        playDeathEffect() {
            try {
                const ctxA = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctxA.createOscillator();
                const gain = ctxA.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, ctxA.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, ctxA.currentTime + 0.5);
                gain.gain.setValueAtTime(this.bgMusic.volume, ctxA.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctxA.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(ctxA.destination);
                osc.start();
                osc.stop(ctxA.currentTime + 0.5);
            } catch(e) { console.log("WebAudio failed"); }
        }
    };

    volumeSlider.addEventListener('input', (e) => audioManager.setVolume(e.target.value));

    class Particle {
        constructor(x, y, color = "#fff") {
            this.x = x; this.y = y;
            this.size = Math.random() * 8 + 2;
            this.speedX = Math.random() * -4 - 2;
            this.speedY = Math.random() * -2 - 1;
            this.alpha = 1;
            this.color = color;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= 0.03;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.restore();
        }
    }

    const player = {
        x: 100, y: 0, dy: 0,
        w: 55, h: 90,
        jumpForce: 22, gravity: 1.15,
        grounded: false,

        reset() { 
            this.y = game.groundY - this.h; 
            this.dy = 0; 
            this.grounded = true;
        },

        update() {
            this.dy += this.gravity;
            this.y += this.dy;
            if (this.y > game.groundY - this.h) {
                this.y = game.groundY - this.h;
                this.dy = 0;
                this.grounded = true;
            } else { this.grounded = false; }
        },

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.fillStyle = "#fff";
            ctx.fillRect(15, 30, 25, 40);
            ctx.beginPath();
            ctx.arc(27, 15, 14, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ff2a2a";
            ctx.fillRect(13, 1, 28, 8);
            ctx.fillRect(35, 6, 15, 4);
            ctx.fillStyle = "#fff";
            ctx.fillRect(15, 70, 9, 20);
            ctx.fillRect(31, 70, 9, 20);
            ctx.restore();
        },

        jump() {
            if (this.grounded && game.active) {
                this.dy = -this.jumpForce;
                this.grounded = false;
            }
        }
    };

    const game = {
        active: false,
        score: 0,
        bestScore: localStorage.getItem('dkBest') || 0,
        speed: 10,
        groundY: 850,
        obstacles: [],
        particles: [],
        shake: 0,
        demonX: -40,
        demonDir: 1,
        reqId: null,

        start() {
            if (this.active) return;
            this.active = true;
            this.score = 0;
            this.speed = 10;
            this.obstacles = [];
            this.particles = [];
            scoreVal.innerText = "0";
            player.reset();
            menu.classList.add('hidden');
            gameOverMsg.style.display = 'none';
            audioManager.playMusic();
            
            if (this.reqId) cancelAnimationFrame(this.reqId);
            this.loop();
        },

        gameOver() {
            this.active = false;
            this.shake = 35;
            audioManager.stopMusic();
            audioManager.playDeathEffect();
            if (this.score > this.bestScore) {
                this.bestScore = this.score;
                localStorage.setItem('dkBest', this.bestScore);
            }
            this.updateScores();
            gameOverMsg.style.display = 'block';
            setTimeout(() => menu.classList.remove('hidden'), 600);
        },

        updateScores() {
            bestValHud.innerText = `РЕКОРД: ${this.bestScore}`;
            menuBest.innerText = `Лучший результат: ${this.bestScore}`;
        },

        drawBG() {
            // Очистка экрана (КРИТИЧНО ДЛЯ МОБИЛОК)
            ctx.clearRect(0, 0, vW, vH);
            
            let g = ctx.createLinearGradient(0, 0, 0, vH);
            g.addColorStop(0, "#050510");
            g.addColorStop(1, "#1a1a2e");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, vW, vH);

            ctx.fillStyle = "#ff2a2a";
            ctx.fillRect(0, this.groundY, vW, 6);
            ctx.fillStyle = "#0a0a0c";
            ctx.fillRect(0, this.groundY + 6, vW, vH - this.groundY);
        },

        loop() {
            if (!this.active) return;
            
            this.drawBG();
            
            ctx.save();
            if (this.shake > 0) {
                ctx.translate(Math.random()*this.shake - this.shake/2, Math.random()*this.shake - this.shake/2);
                this.shake *= 0.9;
            }

            // Демон
            this.demonX += 1.2 * this.demonDir;
            if (this.demonX > 80 || this.demonX < -60) this.demonDir *= -1;
            let dOsc = Math.sin(Date.now() * 0.005) * 20;
            ctx.save();
            ctx.shadowBlur = 40;
            ctx.shadowColor = "red";
            ctx.drawImage(demonImg, this.demonX, 480 + dOsc, 220, 220);
            ctx.restore();

            // Частицы
            if (player.grounded && Math.random() > 0.4) {
                this.particles.push(new Particle(player.x + 10, this.groundY - 5, "rgba(255,255,255,0.4)"));
            }
            for (let i = this.particles.length - 1; i >= 0; i--) {
                this.particles[i].update();
                this.particles[i].draw();
                if (this.particles[i].alpha <= 0) this.particles.splice(i, 1);
            }

            player.update();
            player.draw();
            this.handleObstacles();

            ctx.restore();
            this.reqId = requestAnimationFrame(() => this.loop());
        },

        handleObstacles() {
            if (Math.random() < 0.02 && (this.obstacles.length === 0 || this.obstacles[this.obstacles.length-1].x < vW - 350)) {
                this.obstacles.push({ x: vW + 100, w: 55, h: 70 + Math.random()*60 });
            }

            for (let i = this.obstacles.length - 1; i >= 0; i--) {
                let obs = this.obstacles[i];
                obs.x -= this.speed;
                
                ctx.fillStyle = "#ff2a2a";
                ctx.beginPath();
                ctx.moveTo(obs.x, this.groundY);
                ctx.lineTo(obs.x + obs.w/2, this.groundY - obs.h);
                ctx.lineTo(obs.x + obs.w, this.groundY);
                ctx.fill();

                // Коллизия
                if (player.x + 10 < obs.x + obs.w - 10 && 
                    player.x + player.w - 10 > obs.x + 10 &&
                    player.y + player.h > this.groundY - obs.h) {
                    this.gameOver();
                }

                if (obs.x + obs.w < 0) {
                    this.obstacles.splice(i, 1);
                    this.score++;
                    scoreVal.innerText = this.score;
                    this.speed += 0.15;
                }
            }
        }
    };

    // Универсальное управление
    const handleAction = (e) => {
        // Предотвращаем скролл и зум при нажатии
        if (e.cancelable) e.preventDefault();
        
        if (!game.active && menu.classList.contains('hidden')) {
            // Если игра не активна, но меню скрыто (пауза или переход)
            return;
        }
        player.jump();
    };

    window.addEventListener('touchstart', handleAction, { passive: false });
    window.addEventListener('mousedown', (e) => {
        if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
            handleAction(e);
        }
    });
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.key === 'ArrowUp') handleAction(e);
    });

    game.updateScores();
</script>
