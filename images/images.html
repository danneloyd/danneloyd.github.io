<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Побег от Demonkid</title>
    <style>
        :root {
            --red: #ff2a2a;
            --neon: #00f2ff;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 900px;
            background: #05050a;
            overflow: hidden;
            border: 2px solid #222;
        }

        canvas { width: 100%; height: 100%; display: block; }

        .ui-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: opacity 0.4s, visibility 0.4s;
            text-align: center;
            padding: 20px;
        }

        .ui-layer.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .hud {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            z-index: 50;
            font-weight: 900;
            font-size: 22px;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }

        h1 {
            font-size: 42px;
            margin: 0 0 10px;
            color: var(--red);
            text-shadow: 0 0 20px var(--red);
            text-transform: uppercase;
        }

        #game-over-msg {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        .best-score {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .volume-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        input[type=range] {
            width: 200px;
            accent-color: var(--red);
            cursor: pointer;
            touch-action: auto; 
        }

        .btn {
            background: linear-gradient(180deg, var(--red), #8b0000);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #5e0000;
            transition: 0.1s;
            touch-action: auto;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn-secondary {
            background: linear-gradient(180deg, #444, #222);
            box-shadow: 0 6px 0 #111;
            font-size: 18px;
            padding: 12px 40px;
        }

        .btn:active { 
            transform: translateY(4px);
            box-shadow: 0 2px 0 #5e0000;
        }
        
        .btn-secondary:active {
            box-shadow: 0 2px 0 #111;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div class="hud">
            <div>СЧЕТ: <span id="score-val">0</span></div>
            <div id="best-val">РЕКОРД: 0</div>
        </div>

        <div id="menu" class="ui-layer">
            <div id="game-over-msg">ДЕМОНКИД ДОГНАЛ ВАС</div>
            <h1>ПОБЕГ ОТ ДЕМОНКИДА</h1>
            <div class="best-score" id="menu-best">Лучший результат: 0</div>
            
            <div class="volume-container">
                <label>Громкость</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>

            <button class="btn" id="start-btn">ИГРАТЬ</button>
            <a href="../index.html" class="btn btn-secondary">НАЗАД</a>
        </div>

        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const menu = document.getElementById('menu');
    const bestValHud = document.getElementById('best-val');
    const menuBest = document.getElementById('menu-best');
    const gameOverMsg = document.getElementById('game-over-msg');
    const volumeSlider = document.getElementById('volume-slider');
    const startBtn = document.getElementById('start-btn');

    const vW = 600;
    const vH = 1000;
    canvas.width = vW;
    canvas.height = vH;

    const demonImg = new Image();
    demonImg.src = 'demonkid.jpg';

    const audioManager = {
        bgMusic: new Audio('images.mp3'),
        isInitialized: false,
        
        init() {
            if (this.isInitialized) return;
            this.bgMusic.loop = true;
            this.bgMusic.volume = volumeSlider.value;
            this.isInitialized = true;
        },
        playMusic() {
            this.init();
            this.bgMusic.currentTime = 0;
            this.bgMusic.play().catch(e => console.log("Звук заблокирован"));
        },
        stopMusic() { this.bgMusic.pause(); },
        setVolume(val) { this.bgMusic.volume = val; },
        playDeathEffect() {
            try {
                const ctxA = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctxA.createOscillator();
                const gain = ctxA.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, ctxA.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, ctxA.currentTime + 0.5);
                gain.gain.setValueAtTime(this.bgMusic.volume, ctxA.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctxA.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(ctxA.destination);
                osc.start();
                osc.stop(ctxA.currentTime + 0.5);
            } catch(e) {}
        }
    };

    volumeSlider.addEventListener('input', (e) => audioManager.setVolume(e.target.value));

    class Particle {
        constructor(x, y, color = "#fff") {
            this.x = x; this.y = y;
            this.size = Math.random() * 8 + 2;
            this.speedX = Math.random() * -4 - 2;
            this.speedY = Math.random() * -2 - 1;
            this.alpha = 1;
            this.color = color;
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.03; }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    const game = {
        active: false,
        score: 0,
        bestScore: localStorage.getItem('dkBest') || 0,
        speed: 10,
        groundY: 850,
        obstacles: [],
        particles: [],
        shake: 0,
        demonX: -40,
        demonDir: 1,

        start() {
            this.active = true;
            this.score = 0;
            this.speed = 10;
            this.obstacles = [];
            this.particles = [];
            scoreVal.innerText = "0";
            player.reset();
            menu.classList.add('hidden');
            gameOverMsg.style.display = 'none';
            audioManager.playMusic();
            this.loop();
        },

        gameOver() {
            this.active = false;
            this.shake = 35;
            audioManager.stopMusic();
            audioManager.playDeathEffect();
            if (this.score > this.bestScore) {
                this.bestScore = this.score;
                localStorage.setItem('dkBest', this.bestScore);
            }
            this.updateScores();
            gameOverMsg.style.display = 'block';
            setTimeout(() => menu.classList.remove('hidden'), 600);
        },

        updateScores() {
            bestValHud.innerText = `РЕКОРД: ${this.bestScore}`;
            menuBest.innerText = `Лучший результат: ${this.bestScore}`;
        },

        drawBG() {
            let g = ctx.createLinearGradient(0, 0, 0, vH);
            g.addColorStop(0, "#050510");
            g.addColorStop(1, "#1a1a2e");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, vW, vH);
            ctx.fillStyle = "#ff2a2a";
            ctx.fillRect(0, this.groundY, vW, 6);
            ctx.fillStyle = "#0a0a0c";
            ctx.fillRect(0, this.groundY + 6, vW, vH - this.groundY);
        },

        loop() {
            if (!this.active) return;
            ctx.clearRect(0,0,vW,vH);
            ctx.save();
            if (this.shake > 0) {
                ctx.translate(Math.random()*this.shake - this.shake/2, Math.random()*this.shake - this.shake/2);
                this.shake *= 0.9;
            }
            this.drawBG();
            this.demonX += 1.2 * this.demonDir;
            if (this.demonX > 80 || this.demonX < -60) this.demonDir *= -1;
            let dOsc = Math.sin(Date.now() * 0.005) * 20;
            ctx.save();
            ctx.shadowBlur = 40; ctx.shadowColor = "red";
            ctx.drawImage(demonImg, this.demonX, 480 + dOsc, 220, 220);
            ctx.restore();

            if (player.grounded && Math.random() > 0.4) {
                this.particles.push(new Particle(player.x + 10, this.groundY - 5, "rgba(255,255,255,0.4)"));
            }
            this.particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.alpha <= 0) this.particles.splice(i, 1);
            });
            player.update();
            this.handleObstacles();
            ctx.restore();
            requestAnimationFrame(() => this.loop());
        },

        handleObstacles() {
            if (Math.random() < 0.02 && (this.obstacles.length === 0 || this.obstacles[this.obstacles.length-1].x < vW - 350)) {
                this.obstacles.push({ x: vW + 100, w: 55, h: 65 + Math.random()*60 });
            }
            this.obstacles.forEach((obs, i) => {
                obs.x -= this.speed;
                ctx.fillStyle = "#ff2a2a";
                ctx.beginPath();
                ctx.moveTo(obs.x, this.groundY);
                ctx.lineTo(obs.x + obs.w/2, this.groundY - obs.h);
                ctx.lineTo(obs.x + obs.w, this.groundY);
                ctx.fill();
                if (player.x + 10 < obs.x + obs.w - 10 && player.x + 45 > obs.x + 10 &&
                    player.y + 85 > this.groundY - obs.h) {
                    this.gameOver();
                }
                if (obs.x + obs.w < 0) {
                    this.obstacles.splice(i, 1);
                    this.score++;
                    scoreVal.innerText = this.score;
                    this.speed += 0.15;
                }
            });
        }
    };

    const player = {
        x: 230, y: 0, dy: 0,
        w: 55, h: 90,
        jumpForce: 23, gravity: 1.2,
        grounded: false,
        reset() { this.y = game.groundY - this.h; this.dy = 0; },
        update() {
            this.dy += this.gravity;
            this.y += this.dy;
            if (this.y > game.groundY - this.h) {
                this.y = game.groundY - this.h;
                this.dy = 0;
                this.grounded = true;
            } else { this.grounded = false; }
            this.draw();
        },
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.fillStyle = "#fff";
            ctx.fillRect(15, 30, 25, 40);
            ctx.beginPath(); ctx.arc(27, 15, 14, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ff2a2a";
            ctx.fillRect(13, 1, 28, 8); ctx.fillRect(35, 6, 15, 4);
            ctx.fillStyle = "#fff";
            ctx.fillRect(15, 70, 9, 20); ctx.fillRect(31, 70, 9, 20);
            ctx.restore();
        },
        jump() {
            if (this.grounded && game.active) {
                this.dy = -this.jumpForce;
                this.grounded = false;
            }
        }
    };

    const handleAction = (e) => {
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'A') return;
        
        if (e.type === 'touchstart') e.preventDefault();
        player.jump();
    };

    startBtn.addEventListener('click', () => game.start());
    window.addEventListener('touchstart', handleAction, { passive: false });
    window.addEventListener('mousedown', handleAction);
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.key === 'ArrowUp') player.jump();
    });

    game.updateScores();
</script>
</body>
</html>
